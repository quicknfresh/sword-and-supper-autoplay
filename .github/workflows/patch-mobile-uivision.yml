name: Patch Mobile Simple UI.Vision trigger

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Add UI.Vision Start Mission bridge
        run: |
          python - <<'PY'
          from pathlib import Path

          script_path = Path('sword-and-supper-autoplay-mobile-simple.user.js')
          text = script_path.read_text(encoding='utf-8')

          old_version = '// @version      3.16.15.2'
          new_version = '// @version      3.16.15.3'
          if old_version not in text:
              raise SystemExit('Expected Mobile Simple version not found')
          text = text.replace(old_version, new_version, 1)

          constants_marker = '    let running = false;\n'
          constants = '''    const UIVISION_MACRO_NAME = "SwordSupperStartMission";
    const UIVISION_STORAGE_MODE = "browser";
    const UIVISION_REQUEST_TYPE = "SWORD_SUPPER_UIVISION_START_MISSION";

    let running = false;
'''
          if constants_marker not in text:
              raise SystemExit('running marker not found')
          text = text.replace(constants_marker, constants, 1)

          function_marker = '    function detectModalAndOpen() {\n'
          bridge_functions = '''    function installUiVisionBridge() {
        window.addEventListener("message", (event) => {
            const data = event.data;
            if (!data || data.type !== UIVISION_REQUEST_TYPE) return;

            let sourceHostname = "";
            try {
                sourceHostname = new URL(event.origin).hostname;
            } catch (error) {
                return;
            }

            if (!sourceHostname.endsWith("devvit.net")) return;

            window.dispatchEvent(
                new CustomEvent("kantuRunMacro", {
                    detail: {
                        name: UIVISION_MACRO_NAME,
                        from: "bookmark",
                        storageMode: UIVISION_STORAGE_MODE,
                        closeRPA: 1,
                    },
                })
            );
        });
    }

    function startMissionUiVisionWatcher() {
        let startMissionAlreadyTriggered = false;

        const checkStartMission = () => {
            const startMissionButton = document.querySelector(".mc__button-area");
            const isVisible = Boolean(
                startMissionButton &&
                startMissionButton.isConnected &&
                startMissionButton.getClientRects().length > 0
            );

            if (!CONFIG.loopEnabled || !isVisible) {
                startMissionAlreadyTriggered = false;
                return;
            }

            if (startMissionAlreadyTriggered) return;
            startMissionAlreadyTriggered = true;

            if (window.parent !== window) {
                window.parent.postMessage(
                    { type: UIVISION_REQUEST_TYPE },
                    "*"
                );
            }
        };

        setInterval(checkStartMission, 1000);
        checkStartMission();
    }

    function detectModalAndOpen() {
'''
          if function_marker not in text:
              raise SystemExit('detectModalAndOpen marker not found')
          text = text.replace(function_marker, bridge_functions, 1)

          text = text.replace(
              '                "Toggle auto-chaining into the next mission";',
              '                "Toggle mission looping and UI.Vision Start Mission trigger";',
              1,
          )

          old_reddit = '''        detectModalAndOpen();
    } else if (
'''
          new_reddit = '''        detectModalAndOpen();
        installUiVisionBridge();
    } else if (
'''
          if old_reddit not in text:
              raise SystemExit('Reddit bootstrap marker not found')
          text = text.replace(old_reddit, new_reddit, 1)

          old_devvit = '''        log("Running inside actual game.");
        runAutomation();
'''
          new_devvit = '''        log("Running inside actual game.");
        runAutomation();
        startMissionUiVisionWatcher();
'''
          if old_devvit not in text:
              raise SystemExit('Devvit bootstrap marker not found')
          text = text.replace(old_devvit, new_devvit, 1)
          script_path.write_text(text, encoding='utf-8')

          readme_path = Path('README.md')
          readme = readme_path.read_text(encoding='utf-8')
          readme = readme.replace('Mobile Simple v3.16.15.2', 'Mobile Simple v3.16.15.3')
          readme = readme.replace(
              '| `🔄` | Toggle automatic chaining into another mission |',
              '| `🔄` | Toggle mission chaining and the UI.Vision Start Mission trigger |',
          )
          section = '''
## UI.Vision Start Mission trigger

With `🔄` Loop enabled, Mobile Simple detects the visible **Start Mission** screen and asks UI.Vision to run the Browser-storage macro **`SwordSupperStartMission`** once. It rearms after that screen disappears. The macro should use **XClick** for the visible Start Mission button.

'''
          if '## UI.Vision Start Mission trigger' not in readme:
              readme = readme.replace('## Features\n', section + '## Features\n', 1)
          readme_path.write_text(readme, encoding='utf-8')
          PY

      - name: Validate JavaScript
        run: node --check sword-and-supper-autoplay-mobile-simple.user.js

      - name: Commit patched files to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sword-and-supper-autoplay-mobile-simple.user.js README.md
          git diff --cached --quiet || git commit -m "Trigger UI.Vision Start Mission macro from Loop"
          git push origin HEAD:${{ github.head_ref }}
