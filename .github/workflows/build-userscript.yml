name: Build userscripts

on:
  push:
    branches:
      - main
    paths:
      - '.build/**'
      - '.github/workflows/build-userscript.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Reconstruct and verify Standard userscript
        shell: bash
        run: |
          cat .build/part-*.b64 | base64 --decode > sword-and-supper-autoplay.user.js
          echo "47fd17b4f281496ce361492e1c217f33e99c397fbf13bd7f6a39e2cbbf784516  sword-and-supper-autoplay.user.js" | sha256sum --check
          node --check sword-and-supper-autoplay.user.js

      - name: Reconstruct and verify Mobile Simple userscript
        shell: bash
        run: |
          cat .build/mobile-part-*.b64 | base64 --decode > sword-and-supper-autoplay-mobile-simple.user.js
          echo "1141546ffd3647ad704c1e143ab608346a3713504055bb51e178793a571d0a1b  sword-and-supper-autoplay-mobile-simple.user.js" | sha256sum --check
          node --check sword-and-supper-autoplay-mobile-simple.user.js

      - name: Commit generated userscripts
        shell: bash
        run: |
          if git diff --quiet -- sword-and-supper-autoplay.user.js sword-and-supper-autoplay-mobile-simple.user.js; then
            echo "Userscripts are already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sword-and-supper-autoplay.user.js sword-and-supper-autoplay-mobile-simple.user.js
          git commit -m "Add UI.Vision Start Mission trigger to Mobile Simple"
          git push
