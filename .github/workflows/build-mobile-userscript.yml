name: Build mobile userscript

on:
  push:
    branches:
      - main
    paths:
      - 'sword-and-supper-autoplay.user.js'
      - 'scripts/build_mobile.py'
      - '.github/workflows/build-mobile-userscript.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build mobile script
        run: python scripts/build_mobile.py

      - name: Validate JavaScript
        run: node --check sword-and-supper-autoplay-mobile.user.js

      - name: Confirm automation logic matches Standard
        shell: python
        run: |
          from pathlib import Path
          standard = Path('sword-and-supper-autoplay.user.js').read_text(encoding='utf-8')
          mobile = Path('sword-and-supper-autoplay-mobile.user.js').read_text(encoding='utf-8')
          marker = '        // ========================================================\n        // 1. DYNAMIC UI CSS'
          standard_logic = standard[standard.index('    function runAutomation()'):standard.index(marker)]
          mobile_logic = mobile[mobile.index('    function runAutomation()'):mobile.index(marker)]
          if standard_logic != mobile_logic:
              raise SystemExit('Mobile automation logic differs from Standard')
          print('Automation logic matches Standard exactly.')

      - name: Commit generated mobile userscript
        shell: bash
        run: |
          if git diff --quiet -- sword-and-supper-autoplay-mobile.user.js; then
            echo "Mobile userscript is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sword-and-supper-autoplay-mobile.user.js
          git commit -m "Build standalone mobile userscript"
          git push
